id: graphql-introspection

info:
  name: GraphQL Introspection Enabled
  author: devsecops-ai-team
  severity: medium
  description: GraphQL introspection is enabled, allowing attackers to enumerate the entire API schema
  tags: graphql,introspection,misconfiguration
  reference:
    - https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/
  metadata:
    cwe: CWE-200
    owasp: A01:2021

http:
  - method: POST
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/api/graphql"
    headers:
      Content-Type: application/json
    body: '{"query":"{__schema{types{name}}}"}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "__schema"
          - "types"
        condition: and
      - type: status
        status:
          - 200
