# Secrets scanning pipeline — detect leaked credentials and tokens
name: secrets-only
version: "1.0"
description: "Secrets scanning pipeline using GitLeaks"

nodes:
  gitleaks:
    type: scanner
    tool: gitleaks
    depends_on: []
    inputs:
      target: "${SCAN_TARGET}"
    outputs:
      file: "output/gitleaks-raw.json"
    concurrency_group: light

  normalize:
    type: normalizer
    depends_on: [gitleaks]
    inputs:
      findings: "${DEPS_OUTPUTS}"
    outputs:
      file: "output/secrets-normalized.json"

  format:
    type: formatter
    depends_on: [normalize]
    inputs:
      findings: "output/secrets-normalized.json"
      format: "${OUTPUT_FORMAT:-sarif}"
    outputs:
      file: "output/secrets-report.${OUTPUT_FORMAT:-sarif}"
